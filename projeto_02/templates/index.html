<!DOCTYPE html>
<html>
<head>
    <title>Calculadora de Engenharia</title>
</head>
<body>
    <h2>Dimensionamento de Circuito</h2>
    <form action="/calcular" method="post">
        <label>Corrente (A):</label><br>
        <input type="number" name="corrente" step="0.01" required><br><br>
        
        <label>Distância (m):</label><br>
        <input type="number" name="distancia" step="0.01" required><br><br>
        
        <button type="submit">Calcular Seção</button>
    </form>
</body>
</html>
